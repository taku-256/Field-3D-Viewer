<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <!-- import three.js (importmap) -->
        <script type="importmap">
            {
                "imports": {
                    "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.webgpu.js",
                    "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.webgpu.js",
                    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/"
                }
            }
        </script>
        <link rel="stylesheet" href="style.css" />
        <script type="module" src="main.js"></script>
    </head>

    <body>
        <h1>Fiele 3D Viewer</h1>
        <canvas id="myCanvas"></canvas>
        <canvas
            id="rotor"
            style="
                position: absolute;
                top: 0;
                right: 0;
                padding: 0px;
                margin: 0px;
            "
        ></canvas>
        <center>
            <a style="position: absolute; bottom: 20px">(c)taku-256</a>
        </center>
        <div
            id="cameraOrientation"
            style="
                text-align: center;
                color: whitesmoke;
                font-family: Arial, sans-serif;
                position: absolute;
                right: 10px;
                bottom: 60px;
            "
        ></div>
        <div
            id="odom"
            style="
                text-align: center;
                color: whitesmoke;
                font-family: Arial, sans-serif;
                position: absolute;
                right: 10px;
                bottom: 80px;
            "
        ></div>
    </body>
</html>
