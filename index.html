<!doctype html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />

    <!-- viewport: zoom制御を明示 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <title>Field 3D Viewer</title>

    <meta name="description" content="ブラウザ上で動作する3Dロボットフィールドビジュアライザ。CAD的にオブジェクトを配置し、URL共有・QR共有が可能。" />
    <meta name="keywords" content="3D, viewer, CAD, robotics, three.js, field, simulator" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Field 3D Viewer" />
    <meta property="og:description" content="3Dフィールドをブラウザで構築・共有できるツール" />
    <meta property="og:site_name" content="Field 3D Viewer" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Field 3D Viewer" />
    <meta name="twitter:description" content="3Dフィールドをブラウザで構築・共有できるツール" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />

    <!-- importmap -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
            "pako": "https://cdn.jsdelivr.net/npm/pako@2.1.0/+esm"
        }
    }
    </script>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />

    <!-- QR -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

    <!-- App -->
    <script type="module" src="main.js"></script>

    <!-- mobile behavior hint -->
    <meta name="format-detection" content="telephone=no" />
</head>

<body>
    <header>
        <h1><a href="https://taku-256.github.io/Field-3D-Viewer/" id="headerLink">Field 3D Viewer</a></h1>
    </header>

    <main>
        <canvas id="myCanvas"></canvas>
        <canvas id="rotor"></canvas>

        <div id="cameraOrientation"></div>
        <div id="odom"></div>

        <input class="checkbox" type="checkbox" name="open_close_button" id="open_close_button" />
        <div class="CADopenButton">
            <label for="open_close_button" class="toggleLabel">
                <div class="bar bar_1"></div>
                <div class="bar bar_2"></div>
            </label>
        </div>
        <div id="cadPanel">
            <div class="panelContent">
            </div>
        </div>
    </main>

    <footer>
        <a href="https://github.com/taku-256" target="_blank" rel="noopener noreferrer">&copy; 2026 taku-256</a>
    </footer>
</body>

</html>
