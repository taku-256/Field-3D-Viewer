<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <!-- import three.js (importmap) -->
        <script type="importmap">
            {
                "imports": {
                    "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.webgpu.js",
                    "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.webgpu.js",
                    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/"
                }
            }
        </script>
        <link rel="stylesheet" href="style.css" />
        <script type="module" src="main.js"></script>
    </head>

    <body>
        <h1 style="position: absolute;left: 10px">Field 3D Viewer</h1>
        <canvas id="myCanvas" style="position:absolute;top:100px"></canvas>
        <canvas
            id="rotor"
            style="
                position: absolute;
                top: 100px;
                right: 0;
                padding: 0px;
                margin: 0px;
            "
        ></canvas>
        <!-- <div id="shareArea" style="position: absolute; left: 10px; bottom: 20px; color: whitesmoke; font-family: Arial, sans-serif;">
            <button id="shareButton" type="button">copy</button>
            <span id="shareStatus" style="margin-left: 12px;"></span>
        </div> -->
        <a style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);">&copy; 2026 taku-256</a>
        <div
            id="cameraOrientation"
            style="
                text-align: center;
                color: whitesmoke;
                font-family: Arial, sans-serif;
                position: absolute;
                right: 10px;
                bottom: 60px;
            "
        ></div>
        <div
            id="odom"
            style="
                text-align: center;
                color: whitesmoke;
                font-family: Arial, sans-serif;
                position: absolute;
                right: 10px;
                bottom: 80px;
            "
        ></div>
        <input class="checkbox" type="checkbox" name="open_close_button" id="open_close_button" />
        <div class="CADopenButton">
            <label for="open_close_button" class="toggleLabel">
                <div class="bar bar_1"></div>
                <div class="bar bar_2"></div>
            </label>
        </div>
        <div id="cadPanel">
            <div class="panelContent">
            </div>
        </div>
    </body>
</html>
